<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sweaty Logo - Circle for profile pictures -->
  <!-- Teardrop with smile curve + RGB chromatic aberration glitch -->

  <!-- Dark circular background -->
  <circle cx="256" cy="256" r="256" fill="#0f0f0f"/>

  <!-- Cyan layer (offset left-up, behind) - GLITCH -->
  <g transform="translate(-8, -3)" opacity="0.65">
    <path
      d="M256 72
         C256 72 152 196 152 300
         C152 357.438 198.562 404 256 404
         C313.438 404 360 357.438 360 300
         C360 196 256 72 256 72Z"
      fill="#00ffff"
    />
    <!-- Smile curve cutout -->
    <ellipse cx="256" cy="340" rx="52" ry="28" fill="#0f0f0f"/>
  </g>

  <!-- Green layer (offset right-down, behind) - GLITCH -->
  <g transform="translate(8, 3)" opacity="0.65">
    <path
      d="M256 72
         C256 72 152 196 152 300
         C152 357.438 198.562 404 256 404
         C313.438 404 360 357.438 360 300
         C360 196 256 72 256 72Z"
      fill="#22c55e"
    />
    <!-- Smile curve cutout -->
    <ellipse cx="256" cy="340" rx="52" ry="28" fill="#0f0f0f"/>
  </g>

  <!-- Main white layer (front) -->
  <g>
    <path
      d="M256 72
         C256 72 152 196 152 300
         C152 357.438 198.562 404 256 404
         C313.438 404 360 357.438 360 300
         C360 196 256 72 256 72Z"
      fill="#ffffff"
    />
    <!-- Smile curve cutout - creates the water droplet indent -->
    <ellipse cx="256" cy="340" rx="52" ry="28" fill="#0f0f0f"/>
  </g>
</svg>
